[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "lucid-dev"
version = "0.1.0"
description = "Local dev server for Lucid world model runtimes"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "fastapi>=0.115,<1",
  "pydantic>=2.8,<3",
  "PyYAML>=6,<7",
  "uvicorn>=0.34,<0.35",
  "lucid-runtime>=0.1,<0.2",
]

[project.optional-dependencies]
test = [
  "pytest>=8.3,<9",
  "pytest-asyncio>=0.24,<0.25",
]

[project.scripts]
lucid-dev = "lucid_dev.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv]
package = true

[tool.uv.sources]
lucid-runtime = { path = "../lucid", editable = true }
