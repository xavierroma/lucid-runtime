openapi: 3.1.0
info:
  title: Lucid Runtime Coordinator Internal Session API
  version: 0.1.0
servers:
  - url: https://coordinator.example.com
paths:
  /internal/v1/sessions/{session_id}/running:
    post:
      summary: Mark session as running
      security:
        - workerBearerAuth: []
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session marked running
        '401':
          description: Unauthorized
        '404':
          description: Session not found
        '409':
          description: Invalid state transition
  /internal/v1/sessions/{session_id}/heartbeat:
    post:
      summary: Report worker heartbeat
      security:
        - workerBearerAuth: []
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Heartbeat accepted
        '401':
          description: Unauthorized
        '404':
          description: Session not found
        '409':
          description: Invalid state transition
  /internal/v1/sessions/{session_id}/ended:
    post:
      summary: Mark session ended from runtime
      security:
        - workerBearerAuth: []
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerEndedRequest'
      responses:
        '200':
          description: Session marked ended
        '401':
          description: Unauthorized
        '404':
          description: Session not found

components:
  securitySchemes:
    workerBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Internal callback token
  schemas:
    WorkerEndedRequest:
      type: object
      properties:
        error_code:
          type: string
          nullable: true
        end_reason:
          type: string
          nullable: true
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
