openapi: 3.1.0
info:
  title: Lucid Runtime Coordinator API
  version: 0.1.0
servers:
  - url: https://coordinator.example.com
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        '200':
          description: Healthy
  /models:
    get:
      summary: List supported models
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Supported models in registry order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelsResponse'
  /sessions:
    post:
      summary: Create a session (async dispatch)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - model_name
              properties:
                model_name:
                  type: string
      responses:
        '202':
          description: Session accepted and dispatched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          description: Missing or unsupported model
  /sessions/{session_id}:
    get:
      summary: Get session state
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '404':
          description: Not found
  /sessions/{session_id}:end:
    post:
      summary: End a session (idempotent)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session ended
        '404':
          description: Not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
  schemas:
    Session:
      type: object
      required:
        - session_id
        - room_name
        - model_name
        - state
      properties:
        session_id:
          type: string
          format: uuid
        room_name:
          type: string
        model_name:
          type: string
        state:
          type: string
          enum: [STARTING, READY, RUNNING, PAUSED, CANCELING, ENDED, FAILED]
        error_code:
          type: string
          nullable: true
        end_reason:
          type: string
          nullable: true
    SupportedModel:
      type: object
      required:
        - id
        - display_name
      properties:
        id:
          type: string
        display_name:
          type: string
        description:
          type: string
          nullable: true
    ModelsResponse:
      type: object
      required:
        - models
      properties:
        models:
          type: array
          items:
            $ref: '#/components/schemas/SupportedModel'
    OutputBinding:
      type: object
      required:
        - name
        - kind
      properties:
        name:
          type: string
        kind:
          type: string
        track_name:
          type: string
          nullable: true
        topic:
          type: string
          nullable: true
    Capabilities:
      type: object
      required:
        - control_topic
        - status_topic
        - manifest
        - output_bindings
      properties:
        control_topic:
          type: string
        status_topic:
          type: string
        manifest:
          type: object
        output_bindings:
          type: array
          items:
            $ref: '#/components/schemas/OutputBinding'
    SessionResponse:
      type: object
      required:
        - session
        - capabilities
      properties:
        session:
          $ref: '#/components/schemas/Session'
        client_access_token:
          type: string
        capabilities:
          $ref: '#/components/schemas/Capabilities'
