[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "lucid-runtime"
version = "0.1.0"
description = "Lucid runtime library for realtime world models"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "fastapi>=0.115,<1",
  "httpx>=0.27,<1",
  "numpy>=1.26,<3",
  "pydantic>=2.8,<3",
  "PyYAML>=6,<7",
  "uvicorn>=0.34,<0.35",
]

[project.optional-dependencies]
livekit = [
  "livekit>=0.13,<0.14",
  "av>=13,<14",
]
modal = [
  "modal>=1.3.5",
]
test = [
  "pytest>=8.3,<9",
  "pytest-asyncio>=0.24,<0.25",
]

[project.scripts]
lucid-worker = "lucid.worker:main"
lucid-research-server = "lucid.research_server:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv]
package = true
