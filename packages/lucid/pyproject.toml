[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "lucid-runtime"
version = "0.1.0"
description = "Lucid runtime library for realtime world models"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "numpy>=1.26,<3",
  "pydantic>=2.8,<3",
]

[project.optional-dependencies]
livekit = [
  "httpx>=0.27,<1",
  "livekit>=0.13,<0.14",
  "av>=13,<14",
]
modal = [
  "fastapi>=0.115,<1",
  "httpx>=0.27,<1",
  "modal>=1.3.5",
]
test = [
  "pytest>=8.3,<9",
  "pytest-asyncio>=0.24,<0.25",
]

[project.scripts]
lucid-modal = "lucid.modal.cli:main"

[tool.setuptools.packages.find]
include = ["lucid", "lucid.*"]

[tool.setuptools.package-data]
lucid = ["py.typed"]

[tool.uv]
package = true
