apiVersion: v1
kind: Service
metadata:
  name: {{ include "lucid-runtime.coordinator.fullname" . }}
  labels:
    {{- include "lucid-runtime.labels" . | nindent 4 }}
    app.kubernetes.io/component: coordinator
spec:
  type: {{ .Values.coordinator.service.type }}
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: coordinator
  ports:
    - name: http
      port: {{ .Values.coordinator.service.port }}
      targetPort: http
      protocol: TCP
