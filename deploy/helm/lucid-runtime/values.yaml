nameOverride: ""
fullnameOverride: ""

coordinator:
  replicaCount: 1
  image:
    repository: lucid/coordinator
    tag: dev
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  command: []
  env:
    - name: API_KEY
      value: "replace-me"
    - name: WORKER_INTERNAL_TOKEN
      value: "replace-me"
    - name: LIVEKIT_API_KEY
      value: "replace-me"
    - name: LIVEKIT_API_SECRET
      value: "replace-me"
    - name: WORKER_ID
      value: "wm-worker-1"
    - name: HEARTBEAT_TTL_SECS
      value: "15"
  resources: {}

worker:
  replicaCount: 1
  image:
    repository: lucid/worker
    tag: dev
    pullPolicy: IfNotPresent
  command: []
  env:
    - name: WORKER_ID
      value: "wm-worker-1"
    - name: WORKER_INTERNAL_TOKEN
      value: "replace-me"
  resources: {}
