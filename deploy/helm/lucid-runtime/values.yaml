nameOverride: ""
fullnameOverride: ""

coordinator:
  replicaCount: 1
  image:
    repository: lucid/coordinator
    tag: dev
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  command: []
  env:
    - name: API_KEY
      value: "replace-me"
    - name: WORKER_INTERNAL_TOKEN
      value: "replace-me"
    - name: LIVEKIT_API_KEY
      value: "replace-me"
    - name: LIVEKIT_API_SECRET
      value: "replace-me"
    - name: WORKER_ID
      value: "wm-worker-1"
    - name: MODAL_DISPATCH_BASE_URL
      value: "https://replace-me.modal.run"
    - name: MODAL_DISPATCH_TOKEN
      value: "replace-me"
    - name: COORDINATOR_CALLBACK_BASE_URL
      value: "https://replace-me.coordinator.example.com"
    - name: SESSION_STARTUP_TIMEOUT_SECS
      value: "120"
    - name: SESSION_MAX_DURATION_SECS
      value: "3600"
    - name: SESSION_CANCEL_GRACE_SECS
      value: "30"
    - name: WORKER_HEARTBEAT_TIMEOUT_SECS
      value: "15"
  resources: {}

worker:
  enabled: false
  image:
    repository: lucid/worker
    tag: dev
    pullPolicy: IfNotPresent
